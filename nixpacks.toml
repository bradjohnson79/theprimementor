[phases.setup]
nixPkgs = ["nodejs", "pnpm"]
# swisseph postinstall runs node-gyp; Python + a compiler toolchain are required
aptPkgs = ["python3", "build-essential"]

[phases.install]
cmds = [
  "corepack enable",
  "pnpm install"
]

[phases.build]
cmds = [
  "pnpm --filter @wisdom/api build"
]

[start]
cmd = "pnpm --filter @wisdom/api start"
